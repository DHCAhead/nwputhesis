<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .seq-box { fill: #FFFFFF; stroke: #808080; stroke-width: 1.5; stroke-dasharray: 4 4; }
      .tok-special { fill: #F5F5F5; stroke: #A0A0A0; stroke-width: 1.5; }
      .tok-coord { fill: #E8F4F8; stroke: #90C3D4; stroke-width: 1.5; }
      .tok-face { fill: #FDECEC; stroke: #D99BA4; stroke-width: 1.5; }
      .tok-pad { fill: #F4F6F6; stroke: #A0A0A0; stroke-width: 1.5; stroke-dasharray: 3 3; }
      
      .seq-text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333333; text-anchor: middle; }
      .tok-text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 14px; fill: #333333; text-anchor: middle; }
      .note-text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 13px; fill: #555555; text-anchor: middle; }
      .leg-text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 13px; fill: #333333; text-anchor: start; }
      .math { font-style: italic; }
      
      .callout-poly { fill: #000000; fill-opacity: 0.03; stroke: #B0B0B0; stroke-width: 1; stroke-dasharray: 4 4; }
      .bracket { fill: none; stroke: #666666; stroke-width: 1.5; }
      .arrow-line { fill: none; stroke: #B0B0B0; stroke-width: 2; }
    </style>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#B0B0B0" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <line x1="65" y1="35" x2="930" y2="35" class="arrow-line" marker-end="url(#arrow)" />
  <text x="500" y="25" class="note-text" fill="#888888">Sequence Order</text>

  <path d="M 140,105 L 40,240 L 460,240 L 270,105 Z" class="callout-poly" />
  <path d="M 540,105 L 540,240 L 915,240 L 670,105 Z" class="callout-poly" />

  <g id="main-sequence">
    <rect x="65" y="60" width="70" height="45" rx="4" class="tok-special" />
    <text x="100" y="88" class="seq-text">START</text>

    <rect x="140" y="60" width="130" height="45" rx="4" class="seq-box" />
    <text x="205" y="88" class="seq-text">Face block 1</text>

    <rect x="275" y="60" width="130" height="45" rx="4" class="seq-box" />
    <text x="340" y="88" class="seq-text">Face block 2</text>

    <text x="435" y="88" class="seq-text" fill="#888888">...</text>

    <rect x="465" y="60" width="70" height="45" rx="4" class="tok-special" />
    <text x="500" y="88" class="seq-text">SEP</text>

    <rect x="540" y="60" width="130" height="45" rx="4" class="seq-box" />
    <text x="605" y="88" class="seq-text">Edge block 1</text>

    <rect x="675" y="60" width="130" height="45" rx="4" class="seq-box" />
    <text x="740" y="88" class="seq-text">Edge block 2</text>

    <text x="835" y="88" class="seq-text" fill="#888888">...</text>

    <rect x="865" y="60" width="70" height="45" rx="4" class="tok-special" />
    <text x="900" y="88" class="seq-text">END</text>
  </g>

  <g id="face-callout">
    <rect x="40" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="55" y="268" class="tok-text"><tspan class="math">x</tspan>₁</text>
    
    <rect x="70" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="85" y="268" class="tok-text"><tspan class="math">y</tspan>₁</text>
    
    <rect x="100" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="115" y="268" class="tok-text"><tspan class="math">z</tspan>₁</text>

    <rect x="135" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="150" y="268" class="tok-text"><tspan class="math">x</tspan>₂</text>
    
    <rect x="165" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="180" y="268" class="tok-text"><tspan class="math">y</tspan>₂</text>
    
    <rect x="195" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="210" y="268" class="tok-text"><tspan class="math">z</tspan>₂</text>

    <text x="250" y="268" class="seq-text" fill="#888888">...</text>

    <rect x="275" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="290" y="268" class="tok-text"><tspan class="math">x</tspan>₁₆</text>
    
    <rect x="305" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="320" y="268" class="tok-text"><tspan class="math">y</tspan>₁₆</text>
    
    <rect x="335" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="350" y="268" class="tok-text"><tspan class="math">z</tspan>₁₆</text>

    <rect x="375" y="240" width="85" height="45" rx="3" class="tok-face" />
    <text x="417.5" y="268" class="tok-text"><tspan class="math">face_id</tspan></text>

    <path d="M 40,295 L 40,305 L 365,305 L 365,295" class="bracket" />
    <text x="202.5" y="325" class="note-text" font-weight="bold">48 coordinate tokens</text>
    <text x="202.5" y="343" class="note-text">= 16 sampled 3D points × (x,y,z)</text>

    <path d="M 375,295 L 375,305 L 460,305 L 460,295" class="bracket" />
    <text x="417.5" y="325" class="note-text" font-weight="bold">1 face index</text>
    <text x="417.5" y="343" class="note-text">token</text>
  </g>

  <g id="edge-callout">
    <rect x="540" y="240" width="70" height="45" rx="3" class="tok-face" />
    <text x="575" y="268" class="tok-text"><tspan class="math">face_id</tspan>₁</text>

    <rect x="615" y="240" width="70" height="45" rx="3" class="tok-face" />
    <text x="650" y="268" class="tok-text"><tspan class="math">face_id</tspan>₂</text>

    <rect x="695" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="710" y="268" class="tok-text"><tspan class="math">x</tspan>₁</text>

    <rect x="725" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="740" y="268" class="tok-text"><tspan class="math">y</tspan>₁</text>

    <rect x="755" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="770" y="268" class="tok-text"><tspan class="math">z</tspan>₁</text>

    <text x="802.5" y="268" class="seq-text" fill="#888888">...</text>

    <rect x="825" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="840" y="268" class="tok-text"><tspan class="math">x</tspan>₄</text>

    <rect x="855" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="870" y="268" class="tok-text"><tspan class="math">y</tspan>₄</text>

    <rect x="885" y="240" width="30" height="45" rx="3" class="tok-coord" />
    <text x="900" y="268" class="tok-text"><tspan class="math">z</tspan>₄</text>

    <path d="M 540,295 L 540,305 L 685,305 L 685,295" class="bracket" />
    <text x="612.5" y="325" class="note-text" font-weight="bold">2 adjacent face</text>
    <text x="612.5" y="343" class="note-text">index tokens</text>

    <path d="M 695,295 L 695,305 L 915,305 L 915,295" class="bracket" />
    <text x="805" y="325" class="note-text" font-weight="bold">12 coordinate tokens</text>
    <text x="805" y="343" class="note-text">= 4 sampled 3D points × (x,y,z)</text>
  </g>

  <g id="legend">
    <rect x="560" y="405" width="380" height="110" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5" />
    
    <rect x="580" y="420" width="20" height="20" rx="2" class="tok-coord" />
    <text x="610" y="435" class="leg-text">coordinate token</text>

    <rect x="580" y="455" width="20" height="20" rx="2" class="tok-face" />
    <text x="610" y="470" class="leg-text">face index token</text>

    <rect x="760" y="420" width="20" height="20" rx="2" class="tok-special" />
    <text x="790" y="435" class="leg-text">special token</text>

    <rect x="760" y="455" width="20" height="20" rx="2" class="tok-pad" />
    <text x="790" y="470" class="leg-text">PAD token *</text>

    <text x="580" y="500" class="leg-text" fill="#666666" font-style="italic" font-size="12">* PAD only used for batching / grouped format</text>
  </g>

</svg>
