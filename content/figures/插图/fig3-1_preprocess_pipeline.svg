<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 260" width="100%" height="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
