<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="sans-serif">
  <rect width="900" height="500" fill="#F8F8F8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">Fig 4-2 · MHA vs GQA vs MQA — Grouped Query Attention Configurations</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">三种注意力配置对比 — 本文 n_heads = n_kv_heads = 4，数值上等价 MHA — 占位图（正式示意草案）</text>

  <!-- MHA -->
  <g>
    <text x="160" y="105" text-anchor="middle" font-size="15" font-weight="bold">(a) MHA</text>
    <text x="160" y="125" text-anchor="middle" font-size="12">n_kv_heads = n_heads</text>

    <!-- Q heads -->
    <g>
      <rect x="100" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="135" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="170" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="205" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <text x="160" y="152" text-anchor="middle" font-size="11">Q heads (4)</text>
    </g>

    <!-- K heads -->
    <g>
      <rect x="100" y="220" width="30" height="30" fill="#FFE0E0" stroke="#c33"/>
      <rect x="135" y="220" width="30" height="30" fill="#FFE0E0" stroke="#c33"/>
      <rect x="170" y="220" width="30" height="30" fill="#FFE0E0" stroke="#c33"/>
      <rect x="205" y="220" width="30" height="30" fill="#FFE0E0" stroke="#c33"/>
      <text x="160" y="212" text-anchor="middle" font-size="11">K heads (4)</text>
    </g>

    <!-- V heads -->
    <g>
      <rect x="100" y="280" width="30" height="30" fill="#DFF5DF" stroke="#1a8a3a"/>
      <rect x="135" y="280" width="30" height="30" fill="#DFF5DF" stroke="#1a8a3a"/>
      <rect x="170" y="280" width="30" height="30" fill="#DFF5DF" stroke="#1a8a3a"/>
      <rect x="205" y="280" width="30" height="30" fill="#DFF5DF" stroke="#1a8a3a"/>
      <text x="160" y="272" text-anchor="middle" font-size="11">V heads (4)</text>
    </g>

    <!-- 1:1 lines -->
    <g stroke="#888" stroke-width="1">
      <line x1="115" y1="190" x2="115" y2="220"/>
      <line x1="150" y1="190" x2="150" y2="220"/>
      <line x1="185" y1="190" x2="185" y2="220"/>
      <line x1="220" y1="190" x2="220" y2="220"/>
      <line x1="115" y1="250" x2="115" y2="280"/>
      <line x1="150" y1="250" x2="150" y2="280"/>
      <line x1="185" y1="250" x2="185" y2="280"/>
      <line x1="220" y1="250" x2="220" y2="280"/>
    </g>

    <text x="160" y="345" text-anchor="middle" font-size="11" fill="#555">↑ baseline cost / KV cache</text>
  </g>

  <!-- GQA -->
  <g>
    <text x="450" y="105" text-anchor="middle" font-size="15" font-weight="bold">(b) GQA (e.g. n_kv_heads = 2)</text>
    <text x="450" y="125" text-anchor="middle" font-size="12">multiple Q share each K/V</text>

    <g>
      <rect x="390" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="425" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="460" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="495" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <text x="450" y="152" text-anchor="middle" font-size="11">Q heads (4)</text>
    </g>

    <g>
      <rect x="408" y="220" width="40" height="30" fill="#FFE0E0" stroke="#c33"/>
      <rect x="468" y="220" width="40" height="30" fill="#FFE0E0" stroke="#c33"/>
      <text x="450" y="212" text-anchor="middle" font-size="11">K heads (2)</text>
    </g>

    <g>
      <rect x="408" y="280" width="40" height="30" fill="#DFF5DF" stroke="#1a8a3a"/>
      <rect x="468" y="280" width="40" height="30" fill="#DFF5DF" stroke="#1a8a3a"/>
      <text x="450" y="272" text-anchor="middle" font-size="11">V heads (2)</text>
    </g>

    <g stroke="#888" stroke-width="1">
      <line x1="405" y1="190" x2="425" y2="220"/>
      <line x1="440" y1="190" x2="430" y2="220"/>
      <line x1="475" y1="190" x2="485" y2="220"/>
      <line x1="510" y1="190" x2="490" y2="220"/>
      <line x1="428" y1="250" x2="428" y2="280"/>
      <line x1="488" y1="250" x2="488" y2="280"/>
    </g>

    <text x="450" y="345" text-anchor="middle" font-size="11" fill="#555">↓ KV cache, mid-quality drop</text>
  </g>

  <!-- MQA -->
  <g>
    <text x="740" y="105" text-anchor="middle" font-size="15" font-weight="bold">(c) MQA (n_kv_heads = 1)</text>
    <text x="740" y="125" text-anchor="middle" font-size="12">all Q share one K/V</text>

    <g>
      <rect x="680" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="715" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="750" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <rect x="785" y="160" width="30" height="30" fill="#E8F0FE" stroke="#1a73e8"/>
      <text x="740" y="152" text-anchor="middle" font-size="11">Q heads (4)</text>
    </g>

    <g>
      <rect x="720" y="220" width="40" height="30" fill="#FFE0E0" stroke="#c33"/>
      <text x="740" y="212" text-anchor="middle" font-size="11">K head (1)</text>
    </g>

    <g>
      <rect x="720" y="280" width="40" height="30" fill="#DFF5DF" stroke="#1a8a3a"/>
      <text x="740" y="272" text-anchor="middle" font-size="11">V head (1)</text>
    </g>

    <g stroke="#888" stroke-width="1">
      <line x1="695" y1="190" x2="735" y2="220"/>
      <line x1="730" y1="190" x2="738" y2="220"/>
      <line x1="765" y1="190" x2="742" y2="220"/>
      <line x1="800" y1="190" x2="745" y2="220"/>
      <line x1="740" y1="250" x2="740" y2="280"/>
    </g>

    <text x="740" y="345" text-anchor="middle" font-size="11" fill="#555">↓↓ smallest KV cache, max quality drop</text>
  </g>

  <!-- This thesis config -->
  <rect x="100" y="395" width="700" height="50" fill="#FFF8DC" stroke="#d4a017" stroke-width="2"/>
  <text x="450" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5a00">This thesis: n_heads = 4, n_kv_heads = 4 ⇒ MHA-equivalent</text>
  <text x="450" y="437" text-anchor="middle" font-size="11" fill="#7a5a00">GQA framework retained for future K/V ratio sweeps without architectural change</text>

  <text x="450" y="475" text-anchor="middle" font-size="13" fill="#999">LaTeX label: fig:gqa-vs-mha · 章节建议: §4.3.3 GQA 配置</text>
  <text x="450" y="493" text-anchor="middle" font-size="11" fill="#aaa">[PLACEHOLDER · 正式示意图草案]</text>
</svg>
