<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="sans-serif">
  <rect width="900" height="600" fill="#F8F8F8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">Fig 3-2 · Topology-Aware Ordering: DFS Face + Max-Index Edge</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">拓扑感知排序策略示意：DFS 面排序 + 最大索引边排序 — 占位图（正式示意草案）</text>

  <!-- LEFT: face-edge adjacency graph -->
  <g>
    <text x="220" y="100" text-anchor="middle" font-size="15" font-weight="bold">(a) Face-edge adjacency graph</text>

    <!-- 6 face nodes arranged like a cube unfolding (simple) -->
    <g font-size="14" text-anchor="middle">
      <circle cx="220" cy="180" r="28" fill="#FFFFFF" stroke="#1a73e8" stroke-width="2"/><text x="220" y="185">f₁</text>
      <circle cx="120" cy="260" r="28" fill="#FFFFFF" stroke="#333" stroke-width="2"/><text x="120" y="265">f₂</text>
      <circle cx="220" cy="260" r="28" fill="#FFFFFF" stroke="#333" stroke-width="2"/><text x="220" y="265">f₃</text>
      <circle cx="320" cy="260" r="28" fill="#FFFFFF" stroke="#333" stroke-width="2"/><text x="320" y="265">f₄</text>
      <circle cx="170" cy="360" r="28" fill="#FFFFFF" stroke="#333" stroke-width="2"/><text x="170" y="365">f₅</text>
      <circle cx="270" cy="360" r="28" fill="#FFFFFF" stroke="#333" stroke-width="2"/><text x="270" y="365">f₆</text>

      <!-- edges -->
      <line x1="220" y1="208" x2="220" y2="232" stroke="#888" stroke-width="2"/>
      <line x1="200" y1="200" x2="138" y2="244" stroke="#888" stroke-width="2"/>
      <line x1="240" y1="200" x2="302" y2="244" stroke="#888" stroke-width="2"/>
      <line x1="148" y1="260" x2="192" y2="260" stroke="#888" stroke-width="2"/>
      <line x1="248" y1="260" x2="292" y2="260" stroke="#888" stroke-width="2"/>
      <line x1="210" y1="288" x2="180" y2="332" stroke="#888" stroke-width="2"/>
      <line x1="230" y1="288" x2="260" y2="332" stroke="#888" stroke-width="2"/>
      <line x1="198" y1="360" x2="242" y2="360" stroke="#888" stroke-width="2"/>
      <line x1="140" y1="280" x2="158" y2="335" stroke="#888" stroke-width="2"/>
      <line x1="298" y1="280" x2="282" y2="335" stroke="#888" stroke-width="2"/>
    </g>

    <text x="220" y="420" text-anchor="middle" font-size="12" fill="#1a73e8">DFS start: f₁ (min face index)</text>
  </g>

  <!-- RIGHT: DFS order + max-idx edge order -->
  <g>
    <text x="660" y="100" text-anchor="middle" font-size="15" font-weight="bold">(b) DFS order π &amp; Max-Index Edge Sort</text>

    <!-- DFS order -->
    <g font-size="14" text-anchor="middle">
      <text x="510" y="160" font-weight="bold" fill="#333">DFS face order π:</text>
      <rect x="560" y="143" width="40" height="30" fill="#E8F0FE" stroke="#1a73e8" stroke-width="2"/><text x="580" y="164">f₁</text>
      <text x="608" y="164">→</text>
      <rect x="620" y="143" width="40" height="30" fill="#E8F0FE" stroke="#333"/><text x="640" y="164">f₃</text>
      <text x="668" y="164">→</text>
      <rect x="680" y="143" width="40" height="30" fill="#E8F0FE" stroke="#333"/><text x="700" y="164">f₂</text>
      <text x="728" y="164">→</text>
      <rect x="740" y="143" width="40" height="30" fill="#E8F0FE" stroke="#333"/><text x="760" y="164">f₅</text>
      <text x="788" y="164">→</text>
      <rect x="800" y="143" width="40" height="30" fill="#E8F0FE" stroke="#333"/><text x="820" y="164">f₆</text>
      <text x="848" y="164">→</text>
      <rect x="860" y="143" width="40" height="30" fill="#E8F0FE" stroke="#333"/><text x="880" y="164">f₄</text>
    </g>

    <text x="660" y="215" text-anchor="middle" font-size="12" fill="#555">π⁻¹: f₁=0, f₃=1, f₂=2, f₅=3, f₆=4, f₄=5</text>

    <!-- Max-Index edge sort for f₂ -->
    <g font-size="13">
      <text x="510" y="260" font-weight="bold">For face f₂, edges sorted by key(e):</text>
      <text x="510" y="290">key(e) = max π⁻¹(f') over neighbor f'</text>

      <rect x="510" y="310" width="100" height="32" fill="#E8F0FE" stroke="#1a73e8" stroke-width="2"/>
      <text x="560" y="332" text-anchor="middle">e(f₂-f₅): key=3</text>

      <rect x="620" y="310" width="100" height="32" fill="#FFFFFF" stroke="#333"/>
      <text x="670" y="332" text-anchor="middle">e(f₂-f₃): key=1</text>

      <rect x="730" y="310" width="100" height="32" fill="#FFFFFF" stroke="#333"/>
      <text x="780" y="332" text-anchor="middle">e(f₂-f₁): key=0</text>

      <text x="510" y="370" font-size="12" fill="#555">sorted desc by key → place "long-span" edges first</text>
    </g>

    <text x="660" y="420" text-anchor="middle" font-size="12" fill="#333">⇒ early tokens carry global topology backbone</text>
  </g>

  <!-- Bottom: design rationale -->
  <text x="450" y="475" text-anchor="middle" font-size="13" fill="#222">设计动机：减小自回归序列中拓扑相邻元素的位置距离 (mitigate RoPE attention decay over long range)</text>
  <text x="450" y="498" text-anchor="middle" font-size="12" fill="#555">⚠ AR 端独立贡献待 Q2-A 验证；FSQ 端 canonical sorting 已强证拓扑顺序必要性（RMSE 0.13/0.17 → 0.01 量级）</text>

  <text x="450" y="560" text-anchor="middle" font-size="13" fill="#999">LaTeX label: fig:topology-sort · 章节建议: §3.5 章首</text>
  <text x="450" y="578" text-anchor="middle" font-size="11" fill="#aaa">[PLACEHOLDER · 正式示意图草案]</text>
</svg>
