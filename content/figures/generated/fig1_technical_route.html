<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>本文总体技术路线图</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5d6975;
      --line: #ccd6df;
      --paper: #ffffff;
      --data: #2f6690;
      --data-soft: #edf5f9;
      --model: #2a7f77;
      --model-soft: #edf8f5;
      --eval: #ad7726;
      --eval-soft: #fff7ea;
      --token-a: #d7e9f4;
      --token-b: #d8eee9;
      --token-c: #f7e8c9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f6f9;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    }

    .figure-wrap {
      width: min(96vw, 1500px);
      padding: 18px;
      background: var(--paper);
      border: 1px solid #d8e0e7;
      box-shadow: 0 10px 28px rgba(23, 33, 43, 0.08);
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      background: var(--paper);
    }

    .stage {
      fill: #fff;
      stroke-width: 1.4;
    }

    .stage.data {
      stroke: #b8cedd;
      fill: var(--data-soft);
    }

    .stage.model {
      stroke: #b7d7d1;
      fill: var(--model-soft);
    }

    .stage.eval {
      stroke: #e0c592;
      fill: var(--eval-soft);
    }

    .stage-label {
      font-size: 19px;
      font-weight: 700;
      fill: #fff;
      letter-spacing: 0;
    }

    .node {
      fill: #fff;
      stroke: #c9d4dd;
      stroke-width: 1.4;
    }

    .node.data {
      stroke: #8fb2c8;
    }

    .node.model {
      stroke: #85bdb6;
    }

    .node.eval {
      stroke: #d4ad6c;
    }

    .node-title {
      font-size: 18px;
      font-weight: 700;
      fill: var(--ink);
      letter-spacing: 0;
    }

    .node-sub {
      font-size: 13px;
      fill: var(--muted);
      letter-spacing: 0;
    }

    .tiny {
      font-size: 12px;
      fill: var(--muted);
      letter-spacing: 0;
    }

    .mini-label {
      font-size: 11px;
      fill: #42505c;
      letter-spacing: 0;
    }

    .chip-text {
      font-size: 12px;
      font-weight: 700;
      fill: #24313c;
      letter-spacing: 0;
    }

    .arrow {
      fill: none;
      stroke: #4b5865;
      stroke-width: 2.2;
      marker-end: url(#arrow);
    }

    .thin {
      fill: none;
      stroke: #7b8a97;
      stroke-width: 1.3;
    }

    .dash {
      fill: none;
      stroke: #8d99a6;
      stroke-width: 1.3;
      stroke-dasharray: 5 5;
    }

    .axis {
      stroke: #8d99a6;
      stroke-width: 1.1;
    }

    .token {
      stroke: #a9b7c4;
      stroke-width: 0.8;
    }

    .caption {
      font-size: 14px;
      fill: #4a5561;
      letter-spacing: 0;
    }

    @media print {
      body {
        background: #fff;
      }

      .figure-wrap {
        width: 100%;
        padding: 0;
        border: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="figure-wrap" aria-label="本文总体技术路线图">
    <svg viewBox="0 0 1500 560" role="img" aria-labelledby="route-title route-desc">
      <title id="route-title">本文总体技术路线图</title>
      <desc id="route-desc">
        从 DeepCAD STEP 文件出发，经 B-rep 拓扑分解、NURBS 采样和坐标量化构建 token 序列，
        训练 Decoder-only Transformer 自回归生成，再解析并重建为通过 OpenCASCADE BRepCheck 校验的 CAD 实体。
      </desc>

      <defs>
        <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L9,3.5 L0,7 Z" fill="#4b5865" />
        </marker>
        <marker id="small-arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L7,3 L0,6 Z" fill="#7b8a97" />
        </marker>
        <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="125%">
          <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#17212b" flood-opacity="0.07" />
        </filter>
      </defs>

      <rect x="0" y="0" width="1500" height="560" fill="#ffffff" />

      <!-- Stage containers -->
      <rect class="stage data" x="32" y="48" width="820" height="448" rx="8" />
      <rect x="32" y="48" width="820" height="34" rx="8" fill="var(--data)" />
      <rect x="32" y="70" width="820" height="12" fill="var(--data)" />
      <text class="stage-label" x="442" y="71" text-anchor="middle">数据处理</text>

      <rect class="stage model" x="884" y="48" width="276" height="448" rx="8" />
      <rect x="884" y="48" width="276" height="34" rx="8" fill="var(--model)" />
      <rect x="884" y="70" width="276" height="12" fill="var(--model)" />
      <text class="stage-label" x="1022" y="71" text-anchor="middle">模型生成</text>

      <rect class="stage eval" x="1192" y="48" width="276" height="448" rx="8" />
      <rect x="1192" y="48" width="276" height="34" rx="8" fill="var(--eval)" />
      <rect x="1192" y="70" width="276" height="12" fill="var(--eval)" />
      <text class="stage-label" x="1330" y="71" text-anchor="middle">重建评估</text>

      <!-- Data processing nodes -->
      <g filter="url(#soft-shadow)">
        <rect class="node data" x="60" y="122" width="170" height="236" rx="7" />
      </g>
      <text class="node-title" x="145" y="156" text-anchor="middle">DeepCAD 子集</text>
      <text class="node-sub" x="145" y="179" text-anchor="middle">STEP / CAD 模型</text>
      <g transform="translate(96 209)">
        <rect x="8" y="14" width="82" height="54" rx="3" fill="#f7fafc" stroke="#9fb4c5" />
        <rect x="0" y="6" width="82" height="54" rx="3" fill="#ffffff" stroke="#9fb4c5" />
        <rect x="16" y="-2" width="82" height="54" rx="3" fill="#ffffff" stroke="#9fb4c5" />
        <path d="M32 38 L52 20 L76 27 L70 50 L45 54 Z" fill="#e8f1f6" stroke="#5f7f96" stroke-width="1.3" />
        <circle cx="52" cy="20" r="2.4" fill="#2f6690" />
        <circle cx="76" cy="27" r="2.4" fill="#2f6690" />
        <circle cx="70" cy="50" r="2.4" fill="#2f6690" />
      </g>
      <text class="tiny" x="145" y="313" text-anchor="middle">数据筛选 · 标准化读取</text>
      <text class="tiny" x="145" y="332" text-anchor="middle">面、边、点基础实体</text>

      <path class="arrow" d="M236 240 H263" />

      <g filter="url(#soft-shadow)">
        <rect class="node data" x="270" y="122" width="170" height="236" rx="7" />
      </g>
      <text class="node-title" x="355" y="156" text-anchor="middle">B-rep 拓扑分解</text>
      <text class="node-sub" x="355" y="179" text-anchor="middle">Face / Edge / Vertex</text>
      <g transform="translate(306 205)">
        <path class="thin" d="M27 29 L71 18 L104 45 L77 83 L31 70 Z" />
        <path class="thin" d="M71 18 L77 83" />
        <path class="thin" d="M27 29 L104 45" />
        <g fill="#ffffff" stroke="#2f6690" stroke-width="1.4">
          <circle cx="27" cy="29" r="12" />
          <circle cx="71" cy="18" r="12" />
          <circle cx="104" cy="45" r="12" />
          <circle cx="77" cy="83" r="12" />
          <circle cx="31" cy="70" r="12" />
        </g>
        <text class="chip-text" x="27" y="33" text-anchor="middle">F</text>
        <text class="chip-text" x="71" y="22" text-anchor="middle">E</text>
        <text class="chip-text" x="104" y="49" text-anchor="middle">V</text>
        <text class="chip-text" x="77" y="87" text-anchor="middle">E</text>
        <text class="chip-text" x="31" y="74" text-anchor="middle">F</text>
      </g>
      <text class="tiny" x="355" y="313" text-anchor="middle">提取邻接关系</text>
      <text class="tiny" x="355" y="332" text-anchor="middle">形成拓扑块索引</text>

      <path class="arrow" d="M446 240 H473" />

      <g filter="url(#soft-shadow)">
        <rect class="node data" x="480" y="122" width="170" height="236" rx="7" />
      </g>
      <text class="node-title" x="565" y="156" text-anchor="middle">NURBS 采样</text>
      <text class="node-sub" x="565" y="179" text-anchor="middle">曲面与曲线离散化</text>
      <g transform="translate(513 204)">
        <path d="M6 75 C34 38, 77 31, 125 45 L125 92 C81 78, 37 84, 6 112 Z" fill="#e7f3f8" stroke="#5e8daa" stroke-width="1.2" />
        <g stroke="#b7c8d6" stroke-width="0.9">
          <path d="M22 67 C50 48, 82 45, 117 54" />
          <path d="M15 83 C47 65, 82 63, 122 72" />
          <path d="M10 99 C47 83, 85 82, 126 91" />
          <path d="M30 58 C29 75, 26 92, 21 106" />
          <path d="M59 47 C60 66, 57 84, 51 101" />
          <path d="M88 43 C90 61, 88 78, 83 96" />
          <path d="M114 50 C116 65, 117 81, 115 93" />
        </g>
        <path d="M8 26 C35 5, 62 11, 86 27 S125 42, 136 18" fill="none" stroke="#2f6690" stroke-width="2" />
        <g fill="#2f6690">
          <circle cx="8" cy="26" r="2.3" />
          <circle cx="36" cy="12" r="2.3" />
          <circle cx="65" cy="16" r="2.3" />
          <circle cx="92" cy="31" r="2.3" />
          <circle cx="120" cy="30" r="2.3" />
          <circle cx="136" cy="18" r="2.3" />
        </g>
      </g>
      <text class="tiny" x="565" y="313" text-anchor="middle">曲面网格采样</text>
      <text class="tiny" x="565" y="332" text-anchor="middle">边界曲线采样</text>

      <path class="arrow" d="M656 240 H683" />

      <g filter="url(#soft-shadow)">
        <rect class="node data" x="690" y="122" width="134" height="236" rx="7" />
      </g>
      <text class="node-title" x="757" y="156" text-anchor="middle">量化与序列</text>
      <text class="node-sub" x="757" y="179" text-anchor="middle">B-rep token</text>
      <g transform="translate(718 209)">
        <line class="axis" x1="4" y1="88" x2="96" y2="88" />
        <line class="axis" x1="4" y1="88" x2="4" y2="6" />
        <path d="M11 78 L26 62 L42 62 L57 43 L73 27 L91 18" fill="none" stroke="#2f6690" stroke-width="2" />
        <g fill="#f7e8c9" stroke="#d2ad70" stroke-width="0.8">
          <rect x="14" y="98" width="27" height="20" rx="2" />
          <rect x="44" y="98" width="27" height="20" rx="2" />
          <rect x="74" y="98" width="27" height="20" rx="2" />
        </g>
        <text class="mini-label" x="27.5" y="112" text-anchor="middle">x</text>
        <text class="mini-label" x="57.5" y="112" text-anchor="middle">y</text>
        <text class="mini-label" x="87.5" y="112" text-anchor="middle">z</text>
      </g>
      <text class="tiny" x="757" y="313" text-anchor="middle">坐标离散化</text>
      <text class="tiny" x="757" y="332" text-anchor="middle">拓扑有序拼接</text>

      <!-- Token stream band -->
      <rect x="70" y="395" width="734" height="54" rx="5" fill="#ffffff" stroke="#c9d4dd" />
      <text class="caption" x="91" y="428">序列样式：</text>
      <g transform="translate(168 408)">
        <rect class="token" x="0" y="0" width="56" height="24" rx="3" fill="#eef2f7" />
        <rect class="token" x="65" y="0" width="56" height="24" rx="3" fill="var(--token-a)" />
        <rect class="token" x="130" y="0" width="56" height="24" rx="3" fill="var(--token-c)" />
        <rect class="token" x="195" y="0" width="56" height="24" rx="3" fill="var(--token-c)" />
        <rect class="token" x="260" y="0" width="56" height="24" rx="3" fill="var(--token-b)" />
        <rect class="token" x="325" y="0" width="56" height="24" rx="3" fill="var(--token-c)" />
        <rect class="token" x="390" y="0" width="56" height="24" rx="3" fill="var(--token-c)" />
        <rect class="token" x="455" y="0" width="56" height="24" rx="3" fill="#eef2f7" />
        <text class="chip-text" x="28" y="17" text-anchor="middle">BOS</text>
        <text class="chip-text" x="93" y="17" text-anchor="middle">FACE</text>
        <text class="chip-text" x="158" y="17" text-anchor="middle">u,v</text>
        <text class="chip-text" x="223" y="17" text-anchor="middle">p</text>
        <text class="chip-text" x="288" y="17" text-anchor="middle">EDGE</text>
        <text class="chip-text" x="353" y="17" text-anchor="middle">t</text>
        <text class="chip-text" x="418" y="17" text-anchor="middle">q</text>
        <text class="chip-text" x="483" y="17" text-anchor="middle">EOS</text>
      </g>
      <path class="dash" d="M757 358 V395" />

      <!-- Cross-stage arrows -->
      <path class="arrow" d="M824 240 H943" />
      <path class="arrow" d="M1160 240 H1241" />

      <!-- Model generation node -->
      <g filter="url(#soft-shadow)">
        <rect class="node model" x="936" y="126" width="172" height="320" rx="7" />
      </g>
      <text class="node-title" x="1022" y="160" text-anchor="middle">Decoder-only</text>
      <text class="node-title" x="1022" y="184" text-anchor="middle">Transformer</text>
      <text class="node-sub" x="1022" y="207" text-anchor="middle">自回归生成 token</text>
      <g transform="translate(972 230)">
        <rect x="0" y="0" width="100" height="34" rx="3" fill="#ffffff" stroke="#85bdb6" />
        <rect x="9" y="18" width="100" height="34" rx="3" fill="#ffffff" stroke="#85bdb6" />
        <rect x="18" y="36" width="100" height="34" rx="3" fill="#ffffff" stroke="#85bdb6" />
        <text class="mini-label" x="68" y="58" text-anchor="middle">masked self-attn</text>
        <g transform="translate(11 97)">
          <rect x="0" y="0" width="16" height="16" fill="#2a7f77" opacity="0.65" />
          <rect x="20" y="0" width="16" height="16" fill="#dfe8ee" />
          <rect x="40" y="0" width="16" height="16" fill="#dfe8ee" />
          <rect x="0" y="20" width="16" height="16" fill="#2a7f77" opacity="0.65" />
          <rect x="20" y="20" width="16" height="16" fill="#2a7f77" opacity="0.65" />
          <rect x="40" y="20" width="16" height="16" fill="#dfe8ee" />
          <rect x="0" y="40" width="16" height="16" fill="#2a7f77" opacity="0.65" />
          <rect x="20" y="40" width="16" height="16" fill="#2a7f77" opacity="0.65" />
          <rect x="40" y="40" width="16" height="16" fill="#2a7f77" opacity="0.65" />
          <text class="mini-label" x="91" y="33" text-anchor="middle">因果掩码</text>
        </g>
      </g>
      <text class="tiny" x="1022" y="398" text-anchor="middle">训练：teacher forcing</text>
      <text class="tiny" x="1022" y="418" text-anchor="middle">推理：逐 token 采样</text>

      <!-- Reconstruction / evaluation nodes -->
      <g filter="url(#soft-shadow)">
        <rect class="node eval" x="1234" y="120" width="192" height="164" rx="7" />
      </g>
      <text class="node-title" x="1330" y="154" text-anchor="middle">序列解析</text>
      <text class="node-sub" x="1330" y="177" text-anchor="middle">B-rep 逆向重建</text>
      <g transform="translate(1265 203)">
        <rect class="token" x="0" y="0" width="36" height="20" rx="2" fill="var(--token-a)" />
        <rect class="token" x="43" y="0" width="36" height="20" rx="2" fill="var(--token-c)" />
        <rect class="token" x="86" y="0" width="36" height="20" rx="2" fill="var(--token-b)" />
        <path d="M62 26 V47 M62 47 H23 M62 47 H103" fill="none" stroke="#7b8a97" stroke-width="1.2" marker-end="url(#small-arrow)" />
        <path d="M20 74 L54 55 L105 68 L83 100 L34 97 Z" fill="#f6fafc" stroke="#ad7726" stroke-width="1.4" />
        <path d="M54 55 L83 100 M20 74 L105 68" fill="none" stroke="#d4ad6c" stroke-width="1" />
      </g>
      <text class="tiny" x="1330" y="263" text-anchor="middle">反量化 · 曲面/曲线拟合 · 拓扑缝合</text>

      <path class="arrow" d="M1330 288 V322" />

      <g filter="url(#soft-shadow)">
        <rect class="node eval" x="1234" y="326" width="192" height="114" rx="7" />
      </g>
      <text class="node-title" x="1330" y="358" text-anchor="middle">OpenCASCADE</text>
      <text class="node-sub" x="1330" y="381" text-anchor="middle">BRepCheck 有效性校验</text>
      <g transform="translate(1270 399)">
        <circle cx="9" cy="8" r="7" fill="#ffffff" stroke="#ad7726" />
        <path d="M5 8 L8 12 L14 4" fill="none" stroke="#2a7f77" stroke-width="1.8" />
        <text class="mini-label" x="27" y="12">闭合性 / 邻接一致性</text>
        <circle cx="9" cy="34" r="7" fill="#ffffff" stroke="#ad7726" />
        <path d="M5 34 L8 38 L14 30" fill="none" stroke="#2a7f77" stroke-width="1.8" />
        <text class="mini-label" x="27" y="38">可写出 STEP 实体</text>
      </g>

      <rect x="1254" y="458" width="152" height="26" rx="13" fill="#ffffff" stroke="#ad7726" />
      <text class="caption" x="1330" y="477" text-anchor="middle">可校验 CAD 实体</text>

      <!-- Subtle feedback line -->
      <path class="dash" d="M1255 452 C1096 520, 660 520, 386 452" />
      <text class="caption" x="805" y="528" text-anchor="middle">校验结果用于分析失败模式，并反向修正序列约束、采样精度与模型训练设置</text>
    </svg>
  </main>
</body>
</html>
