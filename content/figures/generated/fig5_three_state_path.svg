<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF4F8"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1F5E82"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C58B2B"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4A9B94"/>
    </marker>
    <style>
      .title { font: 700 24px "Microsoft YaHei", "SimHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #164B67; }
      .subtitle { font: 12px "Microsoft YaHei", "SimHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #5A6975; }
      .label { font: 700 16px "Microsoft YaHei", "SimHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #17212B; }
      .small { font: 12px "Microsoft YaHei", "SimHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #5A6975; }
      .metric { font: 700 21px "Microsoft YaHei", "SimHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #164B67; }
      .panel { fill: #FFFFFF; stroke: #D9E3EA; stroke-width: 1.2; }
      .blue { fill: #EAF1F6; stroke: #1F5E82; stroke-width: 1.6; }
      .amber { fill: #FFF8EA; stroke: #C58B2B; stroke-width: 1.5; }
      .teal { fill: #EEF7F6; stroke: #4A9B94; stroke-width: 1.5; }
      .muted { fill: #F4F7FA; stroke: #B7C8D6; stroke-width: 1.4; }
      .arrowBlue { stroke: #1F5E82; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .arrowAmber { stroke: #C58B2B; stroke-width: 2.2; fill: none; marker-end: url(#arrowAmber); }
      .arrowTeal { stroke: #4A9B94; stroke-width: 2.2; fill: none; marker-end: url(#arrowTeal); }
    </style>
  </defs>
  <rect width="960" height="540" fill="url(#bgGradient)"/>
  <text class="title" x="62" y="42">生成样本三态评测路径</text>
  <text class="subtitle" x="62" y="65">区分“未产出 STEP”“产出但无效”和“产出且有效”，明确 valid rate 的分母口径</text>

  <rect class="panel" x="56" y="94" width="848" height="352" rx="6"/>

  <rect class="blue" x="92" y="185" width="138" height="74" rx="6"/>
  <text class="label" x="161" y="213" text-anchor="middle">生成 token</text>
  <text class="small" x="161" y="235" text-anchor="middle">START → ... → END</text>

  <path class="arrowBlue" d="M233 222 H296"/>
  <rect class="blue" x="304" y="185" width="138" height="74" rx="6"/>
  <text class="label" x="373" y="213" text-anchor="middle">解析与拟合</text>
  <text class="small" x="373" y="235" text-anchor="middle">反量化 / NURBS</text>

  <path class="arrowAmber" d="M373 262 C373 297 327 307 276 318"/>
  <rect class="amber" x="126" y="326" width="210" height="78" rx="6"/>
  <text class="label" x="231" y="354" text-anchor="middle">S1：未产出</text>
  <text class="small" x="231" y="376" text-anchor="middle">解析失败、拟合异常</text>
  <text class="small" x="231" y="394" text-anchor="middle">或未写出 STEP / STL</text>

  <path class="arrowBlue" d="M445 222 H508"/>
  <rect class="muted" x="516" y="185" width="138" height="74" rx="6"/>
  <text class="label" x="585" y="213" text-anchor="middle">写出 STEP</text>
  <text class="small" x="585" y="235" text-anchor="middle">Saved samples</text>

  <path class="arrowBlue" d="M657 222 H720"/>
  <rect class="muted" x="728" y="185" width="138" height="74" rx="6"/>
  <text class="label" x="797" y="213" text-anchor="middle">BRepCheck</text>
  <text class="small" x="797" y="235" text-anchor="middle">OCC IsValid()</text>

  <path class="arrowAmber" d="M797 262 C797 302 752 314 700 326"/>
  <rect class="amber" x="548" y="335" width="190" height="69" rx="6"/>
  <text class="label" x="643" y="362" text-anchor="middle">S2：产出但无效</text>
  <text class="small" x="643" y="384" text-anchor="middle">STEP 可写出，内核校验失败</text>

  <path class="arrowTeal" d="M839 262 C855 296 851 318 822 342"/>
  <rect class="teal" x="758" y="335" width="116" height="69" rx="6"/>
  <text class="label" x="816" y="362" text-anchor="middle">S3：有效</text>
  <text class="small" x="816" y="384" text-anchor="middle">BRepCheck=True</text>

  <rect x="92" y="116" width="246" height="42" rx="5" fill="#FFFFFF" stroke="#D9E3EA"/>
  <text class="small" x="108" y="142">尝试次数 = S1 + S2 + S3</text>
  <rect x="548" y="116" width="326" height="42" rx="5" fill="#FFFFFF" stroke="#D9E3EA"/>
  <text class="small" x="565" y="142">of saved 有效率 = S3 / (S2 + S3)</text>

  <rect x="180" y="462" width="250" height="42" rx="5" fill="#FFFFFF" stroke="#D9E3EA"/>
  <text class="metric" x="305" y="490" text-anchor="middle">hr2_patch1：S1 = 0</text>
  <rect x="522" y="462" width="258" height="42" rx="5" fill="#FFFFFF" stroke="#D9E3EA"/>
  <text class="metric" x="651" y="490" text-anchor="middle">S3 / saved = 97.51%</text>
</svg>
